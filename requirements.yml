    scm: git

  - name: ansible-lockdown.rhel8_cis
    src: https://github.com/ansible-lockdown/rhel8_cis
    scm: git

  - name: ansible-lockdown.rhel9_cis
    src: https://github.com/ansible-lockdown/rhel9_cis
    scm: git

  - name: mindpointgroup.rhel8_cis_audit
  - name: mindpointgroup.rhel9_cis_audit