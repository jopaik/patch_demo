---
- name: Backup Snapshot and Validation
  hosts: jp_rhel, jp_windows
  gather_facts: no
  vars:
    # Snapshot configuration

    snapshot_description: "Automated backup before security patching activity"

  tasks:
    # 1. INITIAL ANNOUNCEMENT
    - name: Notify start of activity
      ansible.builtin.debug:
        msg: "CRITICAL: Starting pre-automation backup snapshots for all targeted hosts."

    # 2. THE 5-SECOND PAUSE
    - name: Pauseto allow storage commit
      ansible.builtin.pause:
        seconds: 5


    # 3. FINAL SUCCESS MESSAGE
    - name: Notify successful completion
      ansible.builtin.debug:
        msg: "SUCCESS: Snapshot backup_{{ inventory_hostname }}_{{ now(fmt='%Y-%m-%d_%H-%M-%S') }} has been successfully completed."
