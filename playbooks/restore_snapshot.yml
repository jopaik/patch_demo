---
- name: Restore Automation Snapshot and Validation
  hosts: jp_rhel, jp_windows
  gather_facts: no
  vars:
    # Snapshot configuration
    snapshot_name: "Post_Patching_Restoration_{{ ansible_date_time.date }}"
    snapshot_description: "Automated backup before security patching activity"

  tasks:
    # 1. INITIAL ANNOUNCEMENT
    - name: Notify start of activity
      ansible.builtin.debug:
        msg: "CRITICAL: Starting Post automation restoration snapshots for all failed targeted hosts."

    # 2. THE 5-SECOND PAUSE
    - name: Pause for 5 seconds to allow storage commit
      ansible.builtin.pause:
        seconds: 5
      when: snapshot_result.changed

    # 3. FINAL SUCCESS MESSAGE
    - name: Notify successful completion
      ansible.builtin.debug:
        msg: "SUCCESS: Snapshot Restoration '{{ snapshot_name }}' has been successfully completed for {{ inventory_hostname }}."
