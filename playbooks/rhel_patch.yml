---
- name: Patch Specific RHEL CVE
  hosts: jp_rhel
  become: true
  vars:
    cve_advisory_id: "{{ input_cve_id | default('RHSA-2026:8259') }}"

  tasks:
    - name: Apply specific advisories via command line
      ansible.builtin.command:
        cmd: "dnf update --advisory={{ cve_advisory_id }} -y"
      register: dnf_result
      changed_when: "'Nothing to do' not in dnf_result.stdout"
     
    - name: Check if reboot is required
      ansible.builtin.command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: false

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ true if reboot_check.rc != 0 else false }}"
        cacheable: yes

    - name: Report status
      ansible.builtin.debug:
        msg: "Patching complete. Reboot required: {{ reboot_required }}"