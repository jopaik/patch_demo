---
- name: Patch Specific RHEL CVEs
  hosts: jp_rhel
  become: true
  vars:
    # 1. Define the default if the variable is not defined at all
    raw_cve_input: "{{ input_cve_id | default('RHSA-2026:8259, CVE-2026-33412') }}"

    # 2. Convert and Clean: If it's a string, split it. If it's already a list, use it.
    cve_advisory_ids: >-
      {% if raw_cve_input is string %}
        {{ (raw_cve_input | replace(',', ' ')).split() | map('trim') | list }}
      {% else %}
        {{ raw_cve_input }}
      {% endif %}
      
  tasks:
    - name: Apply specific advisories via dnf
      # The join filter turns ['ID1', 'ID2'] into "ID1 --advisory=ID2"
      # or we can simply pass them as a space-separated list to one flag
      ansible.builtin.command:
        cmd: "dnf update --advisory={{ cve_advisory_ids | join(' --advisory=') }} -y"
      register: dnf_result
      changed_when: "'Nothing to do' not in dnf_result.stdout"
     
    - name: Check if reboot is required
      ansible.builtin.command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: false

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_check.rc != 0 }}"
        cacheable: yes

    - name: Report status
      ansible.builtin.debug:
        msg: 
          - "Target Advisories: {{ cve_advisory_ids | join(', ') }}"
          - "Patching status: {{ 'Changes applied' if dnf_result.changed else 'No updates needed' }}"
          - "Reboot required: {{ reboot_required }}"