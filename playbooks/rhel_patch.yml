---
- name: Patch Specific RHEL CVE
  hosts: jp_rhel
  become: true
  vars:
    cve_advisory_id: " {{ input_cve_id | default('RHSA-2024:1690') }}"

  tasks:
    - name: Apply specific advisories
      ansible.builtin.dnf:
        security: true
        advisory: "{{ cve_advisory_id }}"
        state: latest
     
    - name: Check if reboot is required
      ansible.builtin.command: needs-restarting -r
      register: reboot_required
      ignore_errors: true
      changed_when: false

    - name: Reboot system if needed
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible due to CVE patch"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      when: reboot_required.rc != 0