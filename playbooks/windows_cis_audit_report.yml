---
- name: Windows 2019 CIS Audit & Local Web Hosting
  hosts: joon-win2019
  become: no
  gather_facts: yes
  vars:
    setup_audit: true
    run_audit: true
    remediate: false
    win2019cis_skip_list: ["18.5.7"]

    # --- THE FIX: Explicitly define the report format and path ---
    # Many versions of the role use these variables to control output:
    audit_format: "html"
    audit_out_file: "C:\\ansible_audit\\report.html"
    
    web_port: 8080
    web_root: "C:\\inetpub\\wwwroot\\compliance"

  tasks:
    - name: Run Windows 2019 CIS Audit
      ansible.builtin.include_role:
        name: ansible-lockdown.windows_2019_cis
      vars:
        # Forcing the output file variable specifically for the role
        win2019cis_audit_out_file: "{{ audit_out_file }}"

    - name: Ensure Audit Report was actually created
      ansible.windows.win_stat:
        path: "{{ audit_out_file }}"
      register: report_stat

    - name: Fail if report is missing
      ansible.builtin.fail:
        msg: "The CIS role finished but did not create {{ audit_out_file }}. Check role logs."
      when: not report_stat.stat.exists

    - name: Install IIS Web Server Role
      ansible.windows.win_feature:
        name: Web-Server
        state: present

    - name: Create Compliance Directory
      ansible.windows.win_file:
        path: "{{ web_root }}"
        state: directory

    - name: Copy Audit Report to Web Root
      ansible.windows.win_copy:
        src: "{{ audit_out_file }}"
        dest: "{{ web_root }}\\index.html"
        remote_src: yes

    - name: Configure CIS Audit Website on Port {{ web_port }}
      community.windows.win_iis_website:
        name: "CIS_Audit_Dashboard"
        state: started
        port: "{{ web_port }}"
        physical_path: "{{ web_root }}"

    - name: Open Firewall Port {{ web_port }}
      community.windows.win_firewall_rule:
        name: "Allow_CIS_Report_8080"
        localport: "{{ web_port }}"
        action: allow
        direction: inbound
        protocol: tcp
        state: present