---
- name: Windows 2019 CIS Audit and Report Hosting
  hosts: joon-win2019
  become: no
  gather_facts: yes
  vars:
    # CIS Role Variables
    setup_audit: true
    run_audit: true
    remediate: false  # Ensure we only audit, not change settings
    
    # Path where the CIS role generates the HTML report
    # (Note: Check the role defaults, usually it's in C:\ansible_audit)
    audit_report_src: "C:\\ansible_audit\\report.html"
    web_root: "C:\\inetpub\\wwwroot\\compliance"

  tasks:
    - name: Run Windows 2019 CIS Audit Role
      ansible.builtin.include_role:
        name: ansible-lockdown.windows_2019_cis

    - name: Install IIS Web Server Role
      ansible.windows.win_feature:
        name: Web-Server
        state: present
        include_management_tools: yes

    - name: Create Compliance Directory in Web Root
      ansible.windows.win_file:
        path: "{{ web_root }}"
        state: directory

    - name: Copy Audit Report to Web Directory
      ansible.windows.win_copy:
        src: "{{ audit_report_src }}"
        dest: "{{ web_root }}\\index.html"
        remote_src: yes

    - name: Create IIS Website on Port 8080
      community.windows.win_iis_website:
        name: "CIS_Audit_Report"
        state: started
        port: 8080
        physical_path: "{{ web_root }}"
      register: iis_status

    - name: Open Firewall Port 8080
      community.windows.win_firewall_rule:
        name: "Allow_8080_CIS_Report"
        localport: 8080
        action: allow
        direction: inbound
        protocol: tcp
        state: present

    - name: Display Access URL
      ansible.builtin.debug:
        msg: "The CIS Report is available at http://{{ ansible_host }}:8080"