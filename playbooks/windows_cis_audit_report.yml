---
- name: Windows 2019 CIS Audit & Local Web Hosting (Easy Checks Only)
  hosts: joon-win2019
  become: no
  gather_facts: yes
  vars:
    setup_audit: true
    run_audit: true
    remediate: false

    # --- THE MASSIVE SKIP LIST ---
    # We disable entire sections to prevent connection drops and deep system changes.
    # We are only allowing Section 1 (Password/Lockout) and specific safe items.
    win2019cis_section2: false
    win2019cis_section3: false
    win2019cis_section4: false
    win2019cis_section5: false
    win2019cis_section6: false
    win2019cis_section7: false
    win2019cis_section8: false
    win2019cis_section9: false
    win2019cis_section17: false
    win2019cis_section18: false

    # Specifically skipping the connection-killers just in case a section is partially enabled
    win2019cis_skip_list: 
      - "18.5.7"   
      - "18.5.10"  
      - "18.5.11" 
      - "18.5.12" 
      - "18.5.4"
      - "2.3.17.4" 
      - "2.3.17.1" 
      - "2.3.17.3" 
      - "2.2.3" 
      - "2.2.34"

    # --- PATH SETTINGS ---
    target_report: "C:\\ansible_audit\\report.html"
    web_root: "C:\\inetpub\\wwwroot\\compliance"

  tasks:
    - name: Prepare Audit Environment
      ansible.windows.win_file:
        path: "C:\\ansible_audit"
        state: "{{ item }}"
      loop: [absent, directory]

    - name: Run Windows 2019 CIS Audit (Low-Risk Profile)
      ansible.builtin.include_role:
        name: ansible-lockdown.windows_2019_cis
      vars:
        win2019cis_output_format: "html"
        win2019cis_output_file: "{{ target_report }}"
        win2019_cis_output_file: "{{ target_report }}"

