- name: Windows 2019 CIS Audit & Local Web Hosting
  hosts: joon-win2019
  become: no
  gather_facts: yes
  vars:
    setup_audit: true
    run_audit: true
    remediate: false

    # --- 1. DISABLE EVERYTHING BY DEFAULT ---
    win2019cis_section1: false
    win2019cis_section2: false
    win2019cis_section3: false
    win2019cis_section4: false
    win2019cis_section5: false
    win2019cis_section6: false
    win2019cis_section7: false
    win2019cis_section8: false
    win2019cis_section9: false
    win2019cis_section17: false
    win2019cis_section18: false

    # --- PATH SETTINGS ---
    target_report: 'C:\ansible_audit\report.html'
    web_root: 'C:\inetpub\wwwroot\compliance'

  tasks:
    - name: Prepare Audit Environment
      ansible.windows.win_file:
        path: 'C:\ansible_audit'
        state: '{{ item }}'
      loop: [absent, directory]

    - name: Configure Surgical Rule Selection
      ansible.builtin.set_fact:
        win2019cis_section1: true
        win2019cis_rule_1_1_1: true

    - name: Run Windows 2019 CIS Audit (Rule 1.1.1 Only)
      ansible.builtin.include_role:
        name: 'ansible-lockdown.windows_2019_cis'
      vars:
        win2019cis_output_format: 'html'
        win2019cis_output_file: '{{ target_report }}'

    - name: Install IIS Web Server
      ansible.windows.win_feature:
        name: 'Web-Server'
        state: present

    - name: Create Web Directory for Report
      ansible.windows.win_file:
        path: '{{ web_root }}'
        state: directory

    - name: Copy Audit Report to Web Root as index.html
      ansible.windows.win_copy:
        src: '{{ target_report }}'
        dest: '{{ web_root }}\index.html'
        remote_src: yes

    - name: Setup IIS Website on Port 8080
      community.windows.win_iis_website:
        name: 'CIS_Audit_Display'
        state: started
        port: 8080
        physical_path: '{{ web_root }}'

    - name: Open Firewall Port 8080
      community.windows.win_firewall_rule:
        name: 'Allow_HTTP_8080'
        localport: 8080
        action: allow
        direction: inbound
        protocol: tcp
        state: present