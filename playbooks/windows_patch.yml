---
- name: Targeted Windows Security Patching
  hosts: jp_windows
  vars:
    # Define the KB number here
    target_kb_id: "{{ input_kb_id | default('KB4052623') }}"

  tasks:
  
    - name: Search and Install specific update
      ansible.windows.win_updates:
        category_names:
          - DefinitionUpdates
          - SecurityUpdates
          - CriticalUpdates
        accept_list: 
          - ".*{{ target_kb_id }}.*"  # This means: "Anything - KB Number - Anything"
        state: installed
      register: kb_patch_result

    - name: Set cacheable reboot flag
      ansible.builtin.set_fact:
        windows_reboot_needed: "{{ kb_patch_result.reboot_required }}"
        cacheable: yes

    - name: Audit Output
      ansible.builtin.debug:
        msg: 
          - "Target KB: {{ target_kb_id }}"
          - "Found matching updates: {{ kb_patch_result.found_update_count }}"
          - "Installed successfully: {{ kb_patch_result.installed_update_count }}"
          - "Reboot Required (Cached): {{ windows_reboot_needed }}"