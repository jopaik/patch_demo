---
- name: Phase 1 - Surgical CIS Remediation
  hosts: jp_rhel
  become: yes
  gather_facts: yes

  vars:
    # 1. Define your selected list of Rules here
    selected_cis_rules:
      - "1.1.1.1"
      - "1.1.1.2"


    # 2. General Role Settings
    rhel9_cis_setup_audit: true
    rhel9_cis_run_audit: true
    rhel9_cis_remediate: true
    rhel9cis_authselect_custom_profile_name: "cis_hardened_profile"

    # 3. Disable all sections by default to ensure only the selected list runs
    rhel9_cis_section1: false
    rhel9_cis_section2: false
    rhel9_cis_section3: false
    rhel9_cis_section4: false
    rhel9_cis_section5: false
    rhel9_cis_section6: false

  tasks:
    - name: Dynamically Enable Selected CIS Rules
      ansible.builtin.set_fact:
        "rhel9_cis_rule_{{ item | replace('.', '_') }}": true
      loop: "{{ selected_cis_rules }}"

    - name: Execute Surgical CIS Remediation
      ansible.builtin.include_role:
        name: ansible-lockdown.rhel9_cis

    - name: Fetch Results
      ansible.builtin.fetch:
        src: "/var/tmp/rhel9-cis-report.html"
        dest: "/runner/project/audit_reports/{{ inventory_hostname }}/surgical_remediation.html"
        flat: yes