---
- name: Rollback Specific RHEL CVE Advisory
  hosts: jp_rhel
  become: true
  vars:
    cve_advisory_id: "{{ input_cve_id | default('RHSA-2026:8259') }}"

  tasks:
    - name: Find the DNF transaction ID for the advisory
      # This looks for the ID in the first column where the advisory ID appears
      ansible.builtin.shell: >
        dnf history list {{ cve_advisory_id }} | grep -m 1 {{ cve_advisory_id }} | awk '{print $1}'
      register: dnf_history_id
      changed_when: false
      failed_when: false

    - name: Undo the DNF transaction
      ansible.builtin.command:
        cmd: "dnf history undo {{ dnf_history_id.stdout }} -y"
      register: undo_result
      # Only run if stdout is a number; skip if it's empty or contains "No"
      when: 
        - dnf_history_id.stdout != ""
        - dnf_history_id.stdout is regex('^[0-9]+$')
      
    - name: Report failure if transaction not found
      ansible.builtin.debug:
        msg: "Could not find a DNF transaction for advisory {{ cve_advisory_id }}. Nothing to rollback."
      when: dnf_history_id.stdout == "" or dnf_history_id.stdout is not regex('^[0-9]+$')

    - name: Check reboot status if rollback happened
      ansible.builtin.command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: false
      when: undo_result is skipped or undo_result is success