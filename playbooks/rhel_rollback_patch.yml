---
- name: Rollback Specific RHEL CVE Advisory
  hosts: jp_rhel
  become: true
  vars:
    cve_advisory_id: "{{ input_cve_id | default('RHSA-2024:1690') }}"

  tasks:
    - name: Find the DNF transaction ID for the advisory
      ansible.builtin.shell: >
        dnf history list {{ cve_advisory_id }} | grep {{ cve_advisory_id }} | awk '{print $1}' | head -n 1
      register: dnf_history_id
      changed_when: false
      failed_when: dnf_history_id.stdout == ""

    - name: Undo the DNF transaction
      ansible.builtin.command:
        cmd: "dnf history undo {{ dnf_history_id.stdout }} -y"
      register: undo_result
      when: dnf_history_id.stdout != ""
      
    - name: Check if reboot is still required after rollback
      ansible.builtin.command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: false

    - name: Update reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ true if reboot_check.rc != 0 else false }}"
        cacheable: yes

    - name: Report Rollback Status
      ansible.builtin.debug:
        msg: 
          - "Rollback of {{ cve_advisory_id }} (Transaction {{ dnf_history_id.stdout }}) complete."
          - "Reboot required: {{ reboot_required }}"