---
- name: Uninstall Security and Defender KBs on Server 2022
  hosts: joon-win2022
  vars:
    default_kb_list: ['KB4052623', 'KB2267602', 'KB5044284', 'KB5044030']

  tasks:
    - name: Normalize KB input
      ansible.builtin.set_fact:
        final_kb_list: "{{ (input_kb_to_unpatch | replace(',', ' ')).split() if input_kb_to_unpatch is defined and input_kb_to_unpatch is string else (input_kb_to_unpatch | default(default_kb_list)) }}"

    - name: Uninstall KBs one by one
      ansible.windows.win_shell: |
        $kb = "{{ item | regex_replace('(?i)kb', '') }}"
        if (Get-HotFix -Id "KB$kb" -ErrorAction SilentlyContinue) {
            Write-Host "REMOVED: $kb"
            wusa.exe /uninstall /kb:$kb /quiet /norestart
        }
      loop: "{{ final_kb_list }}"
      register: uninstall_results
      # We remove 'changed_when' and 'failed_when' here to prevent the "undefined" error
      # Ansible will mark these as 'changed' by default if they run.

    - name: Check if any uninstalls actually took place
      ansible.builtin.set_fact:
        any_patches_removed: "{{ uninstall_results.results | selectattr('stdout', 'contains', 'REMOVED') | list | length > 0 }}"

    - name: Reset Update Cache and Reboot
      block:
        - name: Stop Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: stopped
          loop: [wuauserv, cryptsvc]

        - name: Clear Cache
          ansible.windows.win_shell: |
            if (Test-Path "C:\Windows\SoftwareDistribution") {
              Remove-Item -Path "C:\Windows\SoftwareDistribution" -Recurse -Force
            }
          ignore_errors: yes

        - name: Start Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: started
          loop: [wuauserv, cryptsvc]

        - name: Reboot
          ansible.windows.win_reboot:
            msg: "Finalizing unpatching"
            reboot_timeout: 600
      # Use our new boolean flag
      when: any_patches_removed

    - name: Final Audit Note
      ansible.builtin.debug:
        msg: "System processing complete. If patches were found, the server has rebooted."