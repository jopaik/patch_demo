---
- name: Uninstall Security and Defender KBs on Server 2022
  hosts: joon-win2022
  vars:
    # 1. Define the default list
    default_kb_list: 
      - 'KB4052623'
      - 'KB2267602'
      - 'KB5044284'
      - 'KB5044030'

  tasks:
    - name: Normalize KB input using lazy fix
      ansible.builtin.set_fact:
        final_kb_list: "{{ (input_kb_to_unpatch | replace(',', ' ')).split() if input_kb_to_unpatch is defined and input_kb_to_unpatch is string else (input_kb_to_unpatch | default(default_kb_list)) }}"

    - name: Uninstall KBs one by one
      ansible.windows.win_shell: |
        $kb = "{{ item | regex_replace('(?i)kb', '') }}"
        if (Get-HotFix -Id "KB$kb" -ErrorAction SilentlyContinue) {
            Write-Host "MATCH_FOUND: KB$kb. Uninstalling..."
            wusa.exe /uninstall /kb:$kb /quiet /norestart
            exit 0
        } else {
            Write-Host "NOT_FOUND: KB$kb"
            exit 0
        }
      loop: "{{ final_kb_list }}"
      register: uninstall_results
      # We check the stdout of the current loop iteration for our custom string
      changed_when: "'MATCH_FOUND' in (uninstall_results.results | last).stdout"
      failed_when: false

    - name: Reset Update Cache (Required for Audit Detection)
      block:
        - name: Stop Update Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: stopped
          loop: [wuauserv, cryptsvc]

        - name: Delete SoftwareDistribution Folder
          ansible.windows.win_shell: |
            if (Test-Path "C:\Windows\SoftwareDistribution") {
                Remove-Item -Path "C:\Windows\SoftwareDistribution" -Recurse -Force -ErrorAction SilentlyContinue
            }
          ignore_errors: yes

        - name: Start Update Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: started
          loop: [wuauserv, cryptsvc]
      # Triggers if any item in the loop above resulted in MATCH_FOUND
      when: uninstall_results.changed

    - name: Reboot joon-win2022
      ansible.windows.win_reboot:
        msg: "Rebooting to finalize unpatching of {{ final_kb_list | length }} items."
        reboot_timeout: 600
      when: uninstall_results.changed

    - name: Audit Status
      ansible.builtin.debug:
        msg: "System unpatched. Run your Audit Playbook"