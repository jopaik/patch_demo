---
- name: Uninstall Security and Defender KBs on Server 2022
  hosts: joon-win2022
  vars:
    # 1. Define the default list
    default_kb_list: 
      - 'KB4052623'
      - 'KB2267602'
      - 'KB5044284'
      - 'KB5044030'

  tasks:
    - name: Normalize KB input into a proper list object
      ansible.builtin.set_fact:
        # If input is a string (from a survey), split it. 
        # If it's missing, use the default list.
        final_kb_list: >-
          {% if input_kb_to_unpatch is defined and input_kb_to_unpatch is string %}
            {{ (input_kb_to_unpatch | replace(',', ' ')).split() }}
          {% else %}
            {{ input_kb_to_unpatch | default(default_kb_list) }}
          {% endif %}

    - name: Debug - Verify data type is actually a list
      ansible.builtin.debug:
        msg: "Processing {{ final_kb_list | length }} items of type {{ final_kb_list | type_debug }}"

    - name: Uninstall KBs one by one
      ansible.windows.win_shell: |
        $kb = "{{ item | regex_replace('(?i)kb', '') }}"
        if (Get-HotFix -Id "KB$kb" -ErrorAction SilentlyContinue) {
            Write-Host "Found KB$kb. Uninstalling..."
            wusa.exe /uninstall /kb:$kb /quiet /norestart
            $host.SetShouldExit(10) 
        } else {
            Write-Host "KB$kb not found."
            $host.SetShouldExit(0)
        }
      loop: "{{ final_kb_list }}"
      register: uninstall_results
      failed_when: false 
      changed_when: item.rc == 10

    - name: Reset Update Cache (Required for Audit Detection)
      block:
        - name: Stop Update Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: stopped
          loop: [wuauserv, cryptsvc]

        - name: Delete SoftwareDistribution Folder
          ansible.windows.win_shell: |
            Remove-Item -Path "C:\Windows\SoftwareDistribution" -Recurse -Force -ErrorAction SilentlyContinue
          ignore_errors: yes

        - name: Start Update Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: started
          loop: [wuauserv, cryptsvc]
      when: uninstall_results.changed

    - name: Reboot joon-win2022
      ansible.windows.win_reboot:
        msg: "Rebooting to finalize unpatching of {{ final_kb_list | length }} items."
        reboot_timeout: 600
      when: uninstall_results.changed

    - name: Audit Status
      ansible.builtin.debug:
        msg: "System unpatched. Run your Audit Playbook."