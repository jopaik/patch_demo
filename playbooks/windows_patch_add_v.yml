---
- name: Uninstall Security and Defender KBs on Server 2022
  hosts: joon-win2022
  vars:
    default_kb_list: 
      - 'KB4052623'
      - 'KB2267602'
      - 'KB5044284'
      - 'KB5044030'

  tasks:
    - name: Normalize KB input
      ansible.builtin.set_fact:
        final_kb_list: "{{ (input_kb_to_unpatch | replace(',', ' ')).split() if input_kb_to_unpatch is defined and input_kb_to_unpatch is string else (input_kb_to_unpatch | default(default_kb_list)) }}"

    - name: Uninstall KBs one by one
      ansible.windows.win_shell: |
        $kb = "{{ item | regex_replace('(?i)kb', '') }}"
        if (Get-HotFix -Id "KB$kb" -ErrorAction SilentlyContinue) {
            Write-Host "MATCH_FOUND"
            wusa.exe /uninstall /kb:$kb /quiet /norestart
        }
      loop: "{{ final_kb_list }}"
      register: uninstall_results
      # This looks at the output of the current iteration only
      changed_when: "'MATCH_FOUND' in stdout"
      failed_when: false

    - name: Reset Update Cache and Reboot
      block:
        - name: Stop Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: stopped
          loop: [wuauserv, cryptsvc]

        - name: Clear Cache
          ansible.windows.win_shell: Remove-Item -Path "C:\Windows\SoftwareDistribution" -Recurse -Force -ErrorAction SilentlyContinue
          ignore_errors: yes

        - name: Start Services
          ansible.windows.win_service:
            name: "{{ item }}"
            state: started
          loop: [wuauserv, cryptsvc]

        - name: Reboot
          ansible.windows.win_reboot:
            msg: "Finalizing unpatching"
            reboot_timeout: 600
      # Now that the loop is FINISHED, uninstall_results.changed is valid!
      when: uninstall_results.changed

    - name: Final Audit Note
      ansible.builtin.debug:
        msg: "System unpatched and rebooted. Run audit to update Grafana."