---
- name: Phase 1 & 2 - Integrated Security Audit and Reporting
  # Including all hosts in one play ensures facts are shared in memory
  hosts: jp_rhel, jp_windows, jp_webserver
  gather_facts: yes
  vars:
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"

  tasks:
    # --- DATA COLLECTION SECTION ---
    - name: Save Audit IDs as Facts
      ansible.builtin.set_fact:
        global_cve_ids: "{{ cve_advisory_ids }}"
        global_kb_ids: "{{ target_kb_ids }}"

    - name: RHEL Audit Block
      when: ansible_os_family == "RedHat"
      become: yes
      block:
        - name: Check RHEL for Targeted Advisories
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false

        - name: Discover ALL Unpatched RHEL Advisories
          ansible.builtin.command: "dnf updateinfo list --security"
          register: rhel_all_check
          changed_when: false

        - name: Check RHEL Reboot Status
          ansible.builtin.command: needs-restarting -r
          register: rhel_reboot_check
          failed_when: false
          changed_when: false

        - name: Set RHEL Compliance Facts
          ansible.builtin.set_fact:
            missing_targets: "{{ cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list }}"
            all_unpatched: "{{ rhel_all_check.stdout_lines | default([]) | map('regex_replace', '^\\s*(\\S+).*$', '\\1') | select('match', '^(RHSA|CVE|RHBA|RHEA)') | list }}"
            compliance_status: "{{ 'VULNERABLE' if (cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list | length > 0) else 'COMPLIANT' }}"
            reboot_pending: "{{ 'YES' if rhel_reboot_check.rc | default(0) != 0 else 'NO' }}"

    - name: Windows Audit Block
      when: ansible_os_family == "Windows"
      block:
        - name: Discover ALL Missing Windows KBs
          ansible.windows.win_updates:
            category_names: [SecurityUpdates, CriticalUpdates]
            state: searched
          register: win_all_check

        - name: Check Windows for Targeted KBs
          ansible.windows.win_shell: |
            $targetId = "{{ item }}".ToUpper().Replace("KB", "")
            $allMissing = @({{ (win_all_check.updates | default([])) | map(attribute='kb') | flatten | map('regex_replace', '^', "'") | map('regex_replace', '$', "'") | join(',') | default("''") }})
            $installed = Get-HotFix | Where-Object { $_.HotFixID -match $targetId }
            if ($installed) { exit 0 } elseif ($allMissing -contains $targetId) { exit 1 } else { exit 0 }
          loop: "{{ target_kb_ids }}"
          register: win_target_check
          failed_when: false

        - name: Set Windows Compliance Facts
          ansible.builtin.set_fact:
            missing_targets: "{{ win_target_check.results | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
            all_unpatched: "{{ (win_all_check.updates | default([])) | map(attribute='kb') | flatten | map('regex_replace', '^', 'KB') | unique | list }}"
            compliance_status: "{{ 'VULNERABLE' if (win_target_check.results | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | list | length > 0) else 'COMPLIANT' }}"
            reboot_pending: "{{ 'YES' if (win_updates_reboot_needed | default(false)) else 'NO' }}"

    # --- WEBSERVER DEPLOYMENT SECTION ---
    # We use delegate_to: "{{ item }}" with a loop or a specific host to target the webserver
    - name: Configure Webserver
      delegate_to: "{{ item }}"
      loop: "{{ groups['jp_webserver'] }}"
      run_once: true
      become: yes
      block:
        - name: Install and Configure Apache
          ansible.builtin.dnf:
            name: httpd
            state: present

        - name: Configure Custom Port 8080
          ansible.builtin.copy:
            dest: /etc/httpd/conf.d/ports.conf
            content: "Listen 8080"

        - name: Generate HTML Compliance Report
          ansible.builtin.copy:
            dest: "/var/www/html/index.html"
            content: |
              <!DOCTYPE html>
              <html>
              <head>
                  <title>Security Audit Report</title>
                  <style>
                      body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f8f9fa; }
                      .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 95%; margin: auto; }
                      table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                      th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
                      th { background-color: #212529; color: white; }
                      .VULNERABLE { color: #dc3545; font-weight: bold; }
                      .COMPLIANT { color: #198754; font-weight: bold; }
                      .scroller { max-height: 100px; overflow-y: auto; font-size: 11px; background: #fefefe; border: 1px solid #eee; padding: 5px; }
                  </style>
              </head>
              <body>
                  <div class="container">
                      <h1>Infrastructure Security Dashboard</h1>
                      <p>Audit Timestamp: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}</p>
                      
                      <table>
                          <tr>
                              <th>Host</th>
                              <th>Status</th>
                              <th>Missing Targeted</th>
                              <th>All Missing</th>
                          </tr>
                          {% for h in groups['all'] %}
                            {% if hostvars[h].compliance_status is defined %}
                            <tr>
                                <td><strong>{{ h }}</strong></td>
                                <td><span class="{{ hostvars[h].compliance_status }}">{{ hostvars[h].compliance_status }}</span></td>
                                <td>{{ hostvars[h].missing_targets | join(', ') if hostvars[h].missing_targets else 'None' }}</td>
                                <td>
                                    <div class="scroller">
                                        {{ hostvars[h].all_unpatched | join(', ') if hostvars[h].all_unpatched else 'Clean' }}
                                    </div>
                                </td>
                            </tr>
                            {% endif %}
                          {% endfor %}
                      </table>
                  </div>
              </body>
              </html>
          notify: Restart Apache

  handlers:
    - name: Restart Apache
      delegate_to: "{{ item }}"
      loop: "{{ groups['jp_webserver'] }}"
      ansible.builtin.service:
        name: httpd
        state: restarted