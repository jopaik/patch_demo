---
- name: Phase 1 & 2 - Integrated Security Audit and Centralized Reporting
  hosts: jp_rhel, jp_windows, jp_webserver
  gather_facts: yes
  vars:
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"

  tasks:
    - name: Get current time in New York (Alternate method for older Ansible)
      ansible.builtin.set_fact:
        # Use the epoch (UTC) and convert to America/New_York
        ny_time: "{{ '%Y-%m-%d %H:%M:%S %Z' | strftime(ansible_date_time.epoch, tz='America/New_York') }}"

    - name: Save Audit IDs as Facts
      ansible.builtin.set_fact:
        global_cve_ids: "{{ cve_advisory_ids }}"
        global_kb_ids: "{{ target_kb_ids }}"

    # --- RHEL AUDIT BLOCK ---
    - name: RHEL Audit Block
      when: ansible_os_family == "RedHat"
      become: yes
      block:
        - name: Check RHEL for Targeted Advisories
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false

        - name: Set RHEL Compliance Facts
          ansible.builtin.set_fact:
            missing_targets: "{{ cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list }}"
            compliance_status: "{{ 'VULNERABLE' if (cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list | length > 0) else 'COMPLIANT' }}"

    # --- WINDOWS AUDIT BLOCK ---
    - name: Windows Audit Block
      when: ansible_os_family == "Windows"
      block:
        - name: Discover ALL Missing Windows KBs
          ansible.windows.win_updates:
            category_names: [SecurityUpdates, CriticalUpdates]
            state: searched
          register: win_all_check

        - name: Set Windows Compliance Facts
          ansible.builtin.set_fact:
            missing_targets: "{{ win_all_check.updates | selectattr('kb', 'defined') | map(attribute='kb') | select('in', target_kb_ids) | list }}"
            compliance_status: "{{ 'VULNERABLE' if (win_all_check.updates | selectattr('kb', 'defined') | map(attribute='kb') | select('in', target_kb_ids) | list | length > 0) else 'COMPLIANT' }}"

    # --- WEBSERVER CONFIGURATION (The Reporting Node) ---
    - name: Webserver Setup & Reporting
      delegate_to: joon-webserver
      run_once: true
      become: yes
      block:
        - name: Generate HTML Compliance Report
          ansible.builtin.copy:
            dest: "/var/www/html/index.html"
            mode: '0644'
            content: |
              <!DOCTYPE html>
              <html>
              <head>
                  <title>Security Audit Report</title>
                  <style>
                      body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f8f9fa; }
                      .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 95%; margin: auto; }
                      table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                      th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
                      th { background-color: #212529; color: white; }
                      .VULNERABLE { color: #dc3545; font-weight: bold; }
                      .COMPLIANT { color: #198754; font-weight: bold; }
                  </style>
              </head>
              <body>
                  <div class="container">
                      <h1>Infrastructure Security Dashboard</h1>
                      <p><strong>Report Generated (NY Time):</strong> {{ ny_time }}</p>
                      
                      <table>
                          <tr>
                              <th>Host</th>
                              <th>Status</th>
                              <th>Missing Targeted</th>
                          </tr>
                          {% for host in groups['all'] %}
                            {% if hostvars[host].compliance_status is defined %}
                            <tr>
                                <td>{{ host }}</td>
                                <td><span class="{{ hostvars[host].compliance_status }}">{{ hostvars[host].compliance_status }}</span></td>
                                <td>{{ hostvars[host].missing_targets | join(', ') if hostvars[host].missing_targets else 'None' }}</td>
                            </tr>
                            {% endif %}
                          {% endfor %}
                      </table>
                  </div>
              </body>
              </html>
          notify: Force Restart Apache

  handlers:
    - name: Force Restart Apache
      delegate_to: joon-webserver
      ansible.builtin.systemd:
        name: httpd
        state: restarted