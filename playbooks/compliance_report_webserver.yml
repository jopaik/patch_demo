---
- name: Phase 1 & 2 - Integrated Security Audit and Centralized Reporting
  hosts: jp_rhel, jp_windows, jp_webserver
  gather_facts: yes
  vars:
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"

  tasks:
    - name: Get current time in EDT (Manual Offset)
      ansible.builtin.set_fact:
        ny_time: "{{ '%Y-%m-%d %H:%M:%S EDT' | strftime((ansible_date_time.epoch | int) - 14400) }}"

    # --- RHEL AUDIT BLOCK ---
    - name: RHEL Audit Block
      when: ansible_os_family == "RedHat"
      become: yes
      block:
        - name: Check RHEL for Targeted Advisories
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false

        - name: Get ALL Missing Security Advisories
          ansible.builtin.command: "dnf updateinfo list security --quiet"
          register: rhel_all_vulns
          changed_when: false

        - name: Set RHEL Compliance Facts
          ansible.builtin.set_fact:
            missing_targets: "{{ cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list }}"
            # Extracting all RHSA/CVE IDs from the broad security scan
            full_vulns: "{{ rhel_all_vulns.stdout_lines | map('regex_search', '(RHSA-\\d{4}:\\d+|CVE-\\d{4}-\\d+)') | select('string') | list | unique }}"
            compliance_status: "{{ 'VULNERABLE' if (cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list | length > 0) else 'COMPLIANT' }}"

    # --- WINDOWS AUDIT BLOCK ---
    - name: Windows Audit Block
      when: ansible_os_family == "Windows"
      block:
        - name: Discover ALL Missing Windows KBs
          ansible.windows.win_updates:
            category_names: [SecurityUpdates, CriticalUpdates]
            state: searched
          register: win_all_check

        - name: Set Windows Compliance Facts
          ansible.builtin.set_fact:
            missing_targets: "{{ win_all_check.updates | selectattr('kb', 'defined') | map(attribute='kb') | select('in', target_kb_ids) | list }}"
            # Capturing every missing KB found in the scan
            full_vulns: "{{ win_all_check.updates | selectattr('kb', 'defined') | map(attribute='kb') | list }}"
            compliance_status: "{{ 'VULNERABLE' if (missing_targets | length > 0) else 'COMPLIANT' }}"

    # --- WEBSERVER CONFIGURATION ---
    - name: Webserver Setup & Reporting
      delegate_to: joon-webserver
      run_once: true
      become: yes
      block:
        - name: Generate HTML Compliance Report
          ansible.builtin.copy:
            dest: "/var/www/html/index.html"
            mode: '0644'
            content: |
              <!DOCTYPE html>
              <html>
              <head>
                  <title>Security Audit Report powered by Ansible</title>
                  <style>
                      body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f8f9fa; }
                      .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
                      table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
                      th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; vertical-align: top; word-wrap: break-word; }
                      th { background-color: #212529; color: white; }
                      .VULNERABLE { color: #dc3545; font-weight: bold; }
                      .COMPLIANT { color: #198754; font-weight: bold; }
                      .vuln-tag { display: inline-block; background: #eee; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 11px; font-family: monospace; }
                  </style>
              </head>
              <body>
                  <div class="container">
                      <h1>Infrastructure Security Dashboard</h1>
                      <p><strong>Report Generated (NY Time):</strong> {{ ny_time }}</p>
                      
                      <table>
                          <tr>
                              <th style="width: 15%;">Host</th>
                              <th style="width: 10%;">Status</th>
                              <th style="width: 25%;">Missing Targeted (High Priority)</th>
                              <th style="width: 50%;">Full System Vulnerabilities (All Missing KBs/CVEs)</th>
                          </tr>
                          {% for host in groups['all'] %}
                            {% if hostvars[host].compliance_status is defined %}
                            <tr>
                                <td>{{ host }}</td>
                                <td><span class="{{ hostvars[host].compliance_status }}">{{ hostvars[host].compliance_status }}</span></td>
                                <td>{{ hostvars[host].missing_targets | join(', ') if hostvars[host].missing_targets else 'None' }}</td>
                                <td>
                                    {% if hostvars[host].full_vulns %}
                                        {% for vuln in hostvars[host].full_vulns %}
                                            <span class="vuln-tag">{{ vuln }}</span>
                                        {% endfor %}
                                    {% else %}
                                        None
                                    {% endif %}
                                </td>
                            </tr>
                            {% endif %}
                          {% endfor %}
                      </table>
                  </div>
              </body>
              </html>
          notify: Force Restart Apache

  handlers:
    - name: Force Restart Apache
      delegate_to: joon-webserver
      ansible.builtin.shell: "sudo systemctl restart httpd"