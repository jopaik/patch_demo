---
- name: Output Multi-OS Compliance and Status
  hosts: jp_rhel, jp_windows, jp_webserver
  gather_facts: false

  tasks:
    # Minimal gathering to identify OS family
    - name: Gather OS Family only
      ansible.builtin.setup:
        gather_subset:
          - 'distribution'

    # --- RHEL OUTPUT ---
    - name: Display RHEL Compliance Logic
      vars:
        # Standard Jinja2 filtering for RHEL
        rhel_missing: "{{ cve_advisory_ids | default([]) | select('in', rhel_target_check.stdout | default('')) | list }}"
        rhel_vulns: "{{ rhel_all_vulns.stdout_lines | default([]) | map('regex_search', '(RHSA-\\d{4}:\\d+|CVE-\\d{4}-\\d+)') | select('string') | list | unique }}"
      ansible.builtin.debug:
        msg:
          - "------------------------------------------------"
          - "HOST: {{ inventory_hostname }} (RHEL)"
          - "STATUS: {{ 'NON-COMPLIANT' if (missing_targets | length > 0 or full_vulns | length > 0) else 'COMPLIANT' }}"
          - "------------------------------------------------"
          - "Missing Targets:    {{ missing_targets | to_nice_json }}"
          - "Vulnerabilities:    {{ full_vulns | to_nice_json }}"
          - "Reboot Required:    {{ 'YES' if rhel_reboot_check.rc | default(0) != 0 else 'NO' }}"
      when: ansible_os_family == "RedHat"