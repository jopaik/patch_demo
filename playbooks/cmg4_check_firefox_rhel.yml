---
- name: Check Firefox Installation using DNF
  hosts: jp_rhel
  become: yes
  tasks:
    - name: Query DNF for Firefox
      ansible.builtin.dnf:
        list: firefox
      register: dnf_result

    - name: Filter and Display Installed Version
      ansible.builtin.debug:
        msg: "Firefox is INSTALLED at version: {{ item.version }}-{{ item.release }}"
      loop: "{{ dnf_result.results }}"
      when: item.yumstate == 'installed'
      loop_control:
        label: "{{ item.name }}"

    - name: Set Fact for Downstream Tasks
      ansible.builtin.set_fact:
        firefox_installed: "{{ dnf_result.results | selectattr('yumstate', 'equalto', 'installed') | list | length > 0 }}"