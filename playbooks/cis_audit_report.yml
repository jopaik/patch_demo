---
- name: Phase 1 - Audit Targeted Patches & CIS Benchmarks
  hosts: jp_rhel, jp_windows
  become: no
  gather_facts: yes
  vars:
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"
    # CIS Scan Variables
    audit_out_dir_win: "C:\\cis_audit_results"
    audit_out_dir_rhel: "/var/tmp/cis_reports"

  tasks:
    - name: Save Audit IDs as Facts
      ansible.builtin.set_fact:
        global_cve_ids: "{{ cve_advisory_ids }}"
        global_kb_ids: "{{ target_kb_ids }}"

    # --- RHEL AUDIT & CIS SCAN ---
    - name: RHEL Block
      when: ansible_os_family == "RedHat"
      become: yes
      block:
        - name: Check RHEL Patching Status
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false

        - name: Discover ALL Unpatched RHEL Advisories
          ansible.builtin.command: "dnf updateinfo list --security"
          register: rhel_all_check
          changed_when: false

        - name: Check RHEL Reboot Status
          ansible.builtin.command: needs-restarting -r
          register: rhel_reboot_check
          failed_when: false
          changed_when: false

        - name: Run RHEL 9 CIS Audit (Audit Mode Only)
          ansible.builtin.include_role:
            name: ansible-lockdown.rhel9_cis
          vars:
            rhel9_cis_setup_audit: true
            rhel9_cis_run_audit: true
            rhel9_cis_remediate: false
          when: ansible_distribution_major_version == "9"

        - name: Fetch RHEL CIS Reports
          ansible.builtin.fetch:
            src: "/var/tmp/rhel9-cis-report.html"
            dest: "./audit_reports/{{ inventory_hostname }}/index.html"
            flat: yes
          failed_when: false

    # --- WINDOWS AUDIT & CIS SCAN ---
    - name: Windows Block
      when: ansible_os_family == "Windows"
      block:
        - name: Discover ALL Missing Windows KBs
          ansible.windows.win_updates:
            category_names: [SecurityUpdates, CriticalUpdates]
            state: searched
          register: win_all_check

        - name: Check Windows for Targeted KBs
          ansible.windows.win_shell: |
            $targetId = "{{ item }}".ToUpper().Replace("KB", "")
            $allMissing = @({{ win_all_check.updates | map(attribute='kb') | flatten | map('regex_replace', '^', "'") | map('regex_replace', '$', "'") | join(',') }})
            $installed = Get-HotFix | Where-Object { $_.HotFixID -match $targetId }
            if ($installed -or ($allMissing -notcontains $targetId)) { exit 0 } else { exit 1 }
          loop: "{{ target_kb_ids }}"
          register: win_target_check
          failed_when: false

        - name: Run Windows 2019 CIS Audit (Audit Mode Only)
          ansible.builtin.include_role:
            name: ansible-lockdown.Windows-2019-CIS
          vars:
            setup_audit: true
            run_audit: true
            remediate: false
          when: ansible_distribution == "Microsoft Windows Server 2019 Standard"

        - name: Fetch Windows CIS Reports
          ansible.windows.win_find:
            paths: "C:\\cis_audit_results"
            patterns: "*.html"
          register: win_cis_files

        - name: Fetch Windows Reports to Controller
          ansible.builtin.fetch:
            src: "{{ item.path }}"
            dest: "./audit_reports/{{ inventory_hostname }}/index.html"
            flat: yes
          loop: "{{ win_cis_files.files }}"

    - name: Set Host Compliance Facts
      ansible.builtin.set_fact:
        missing_targets: "{{ rhel_target_check.stdout_lines if ansible_os_family == 'RedHat' else win_target_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
        compliance_status: "{{ 'VULNERABLE' if (rhel_target_check.stdout != '' or (win_target_check.results | selectattr('rc', 'ne', 0) | list | length > 0)) else 'COMPLIANT' }}"
        reboot_pending: "{{ 'YES' if (rhel_reboot_check is defined and rhel_reboot_check.rc != 0) or (win_reboot_check is defined and win_reboot_check.stdout | trim == 'True') else 'NO' }}"

# ==========================================
# PHASE 2: GENERATE CONSOLIDATED REPORT
# ==========================================
- name: Phase 2 - Deploy Centralized Report Webserver
  hosts: jp_webserver
  become: yes
  tasks:
    - name: Webserver Setup
      block:
        - ansible.builtin.dnf: { name: httpd, state: present }
        - name: Listen on multiple ports
          ansible.builtin.copy:
            dest: /etc/httpd/conf.d/ports.conf
            content: |
              Listen 8080
              Listen 8081
        - ansible.posix.firewalld: { port: "{{ item }}/tcp", permanent: yes, state: enabled, immediate: yes }
        loop: [8080, 8081]

    - name: Create Compliance Web Root
      ansible.builtin.file: { path: /var/www/compliance, state: directory, mode: '0755' }

    - name: Upload CIS Detailed Reports
      ansible.builtin.copy:
        src: "./audit_reports/"
        dest: "/var/www/compliance/"
        mode: '0644'

    - name: Generate Infrastructure Dashboard (8080)
      ansible.builtin.template:
        dest: "/var/www/html/index.html"
        src: dashboard_template.j2 # Assuming the HTML from your prompt is here
      # (Note: Use the HTML content from your prompt for this task)

    - name: Generate CIS Master Index (8081)
      ansible.builtin.copy:
        dest: "/var/www/compliance/index.html"
        content: |
          <html><body style="font-family:sans-serif; background:#2c3e50; color:white; padding:50px;">
          <div style="background:white; color:#333; padding:30px; border-radius:10px; max-width:800px; margin:auto;">
          <h1>CIS Compliance Portal (Port 8081)</h1>
          <hr>
          {% for host in groups['all'] %}
          <a href="/{{ host }}/index.html" style="display:block; padding:10px; margin:5px; background:#eee; color:#2980b9;">{{ host }} - Detailed CIS Report</a>
          {% endfor %}
          </div></body></html>
      notify: Restart Apache

  handlers:
    - name: Restart Apache
      ansible.builtin.service: { name: httpd, state: restarted }