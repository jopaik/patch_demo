---
- name: Phase 1 - Audit Targeted Patches & CIS Benchmarks
  hosts: jp_rhel, jp_windows
  become: no
  gather_facts: yes
  vars:
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"
    # Local controller directory to store fetched reports
    local_audit_dir: "./audit_reports"

  tasks:
    - name: Save Audit IDs as Facts for Web Reporting
      ansible.builtin.set_fact:
        global_cve_ids: "{{ cve_advisory_ids }}"
        global_kb_ids: "{{ target_kb_ids }}"

    # --- RHEL AUDIT & CIS SCAN ---
    - name: RHEL Audit Block
      when: ansible_os_family == "RedHat"
      become: yes
      block:
        - name: Check RHEL for Targeted Advisories
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false

        - name: Discover ALL Unpatched RHEL Advisories
          ansible.builtin.command: "dnf updateinfo list --security"
          register: rhel_all_check
          changed_when: false

        - name: Check RHEL Reboot Status
          ansible.builtin.command: needs-restarting -r
          register: rhel_reboot_check
          failed_when: false
          changed_when: false

        - name: Run RHEL 9 CIS Audit Role
          ansible.builtin.include_role:
            name: ansible-lockdown.rhel9_cis 
          vars:
            rhel9_cis_setup_audit: true
            rhel9_cis_run_audit: true
            rhel9_cis_remediate: false
          when: ansible_distribution_major_version == "9"

        - name: Fetch RHEL CIS Report to Controller
          ansible.builtin.fetch:
            src: "/var/tmp/rhel9-cis-report.html"
            dest: "{{ local_audit_dir }}/{{ inventory_hostname }}/index.html"
            flat: yes
          failed_when: false

    # --- WINDOWS AUDIT & CIS SCAN ---
    - name: Windows Audit Block
      when: ansible_os_family == "Windows"
      block:
        - name: Discover ALL Missing Windows KBs
          ansible.windows.win_updates:
            category_names: [SecurityUpdates, CriticalUpdates]
            state: searched
          register: win_all_check

        - name: Check Windows for Targeted KBs (Smart Logic)
          ansible.windows.win_shell: |
            $targetId = "{{ item }}".ToUpper().Replace("KB", "")
            $allMissing = @({{ win_all_check.updates | map(attribute='kb') | flatten | map('regex_replace', '^', "'") | map('regex_replace', '$', "'") | join(',') }})
            $installed = Get-HotFix | Where-Object { $_.HotFixID -match $targetId }
            if ($installed -or ($allMissing -notcontains $targetId)) { exit 0 } else { exit 1 }
          loop: "{{ target_kb_ids }}"
          register: win_target_check
          failed_when: false 

        - name: Check Windows Reboot Status
          ansible.windows.win_shell: |
            $reboot = $false
            $paths = @("HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired","HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending")
            foreach ($p in $paths) { if (Test-Path $p) { $reboot = $true } }
            return $reboot
          register: win_reboot_check
          failed_when: false

        - name: Run Windows 2019 CIS Audit Role
          ansible.builtin.include_role:
            name: ansible-lockdown.windows_2019_cis
          vars:
            setup_audit: true
            run_audit: true
            remediate: false
          when: ansible_distribution contains "2019"

        - name: Find Windows CIS Report
          ansible.windows.win_find:
            paths: "C:\\cis_audit_results"
            patterns: "*.html"
          register: win_cis_files

        - name: Fetch Windows CIS Report to Controller
          ansible.builtin.fetch:
            src: "{{ item.path }}"
            dest: "{{ local_audit_dir }}/{{ inventory_hostname }}/index.html"
            flat: yes
          loop: "{{ win_cis_files.files }}"

    - name: Set Universal Compliance Facts
      ansible.builtin.set_fact:
        missing_targets: "{{ rhel_target_check.stdout_lines if ansible_os_family == 'RedHat' else win_target_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
        all_unpatched: "{{ rhel_all_check.stdout_lines if ansible_os_family == 'RedHat' else win_all_check.updates | map(attribute='kb') | flatten | list }}"
        compliance_status: "{{ 'VULNERABLE' if ( (rhel_target_check is defined and rhel_target_check.stdout != '') or (win_target_check is defined and win_target_check.results | selectattr('rc', 'ne', 0) | list | length > 0) ) else 'COMPLIANT' }}"
        reboot_pending: "{{ 'YES' if ( (rhel_reboot_check is defined and rhel_reboot_check.rc != 0) or (win_reboot_check is defined and win_reboot_check.stdout | trim == 'True') ) else 'NO' }}"

# ==========================================
# PHASE 2: GENERATE CONSOLIDATED REPORTS
# ==========================================
- name: Phase 2 - Deploy Centralized Report Webserver
  hosts: jp_webserver
  become: yes
  tasks:
    - name: Webserver Setup
      block:
        - name: Install Apache
          ansible.builtin.dnf:
            name: httpd
            state: present

        - name: Configure Ports 8080 and 8081
          ansible.builtin.copy:
            dest: /etc/httpd/conf.d/ports.conf
            content: |
              Listen 8080
              Listen 8081

        - name: Open Firewall Ports
          ansible.posix.firewalld:
            port: "{{ item }}/tcp"
            permanent: yes
            state: enabled
            immediate: yes
          loop:
            - 8080
            - 8081

        - name: Start Apache Service
          ansible.builtin.service:
            name: httpd
            state: started
            enabled: yes

    - name: Prepare CIS Compliance Directory
      ansible.builtin.file:
        path: /var/www/compliance
        state: directory
        mode: '0755'

    - name: Upload CIS Audit Reports to Webserver
      ansible.builtin.copy:
        src: "./audit_reports/"
        dest: "/var/www/compliance/"
        mode: '0644'

    - name: Generate Patch Dashboard (8080)
      ansible.builtin.copy:
        dest: "/var/www/html/index.html"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Infrastructure Dashboard</title>
              <style>
                  body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
                  .container { background: white; padding: 20px; border-radius: 8px; }
                  table { width: 100%; border-collapse: collapse; }
                  th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
                  th { background: #333; color: white; }
                  .VULNERABLE { color: red; font-weight: bold; }
                  .COMPLIANT { color: green; font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Infrastructure Patching Dashboard</h1>
                  <table>
                      <tr>
                          <th>Host</th>
                          <th>Status</th>
                          <th>Reboot Required</th>
                          <th>CIS Audit Link</th>
                      </tr>
                      {% for host in groups['all'] %}
                      {% if hostvars[host]['compliance_status'] is defined %}
                      <tr>
                          <td>{{ host }}</td>
                          <td><span class="{{ hostvars[host]['compliance_status'] }}">{{ hostvars[host]['compliance_status'] }}</span></td>
                          <td>{{ hostvars[host]['reboot_pending'] }}</td>
                          <td><a href="http://{{ ansible_host }}:8081/{{ host }}/index.html">View Detailed Audit</a></td>
                      </tr>
                      {% endif %}
                      {% endfor %}
                  </table>
              </div>
          </body>
          </html>

    - name: Generate CIS Master Index (8081)
      ansible.builtin.copy:
        dest: "/var/www/compliance/index.html"
        content: |
          <html><body style="font-family:sans-serif; background:#2c3e50; color:white; padding:50px;">
          <div style="background:white; color:#333; padding:30px; border-radius:10px; max-width:800px; margin:auto;">
          <h1>CIS Security Portal</h1>
          <hr>
          {% for host in groups['all'] %}
          <a href="/{{ host }}/index.html" style="display:block; padding:10px; margin:5px; background:#eee; color:#2980b9;">{{ host }} - Full Security Report</a>
          {% endfor %}
          </div></body></html>
      notify: Restart Apache

  handlers:
    - name: Restart Apache
      ansible.builtin.service:
        name: httpd
        state: restarted