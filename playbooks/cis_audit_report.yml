---
- name: Phase 1 - Audit Patches, CIS Benchmarks, and Collect .audit_report
  hosts: jp_rhel, jp_windows
  become: no
  gather_facts: yes
  vars:
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"
    local_audit_dir: "/runner/project/audit_reports"

  tasks:
    - name: Save Audit IDs as Facts
      ansible.builtin.set_fact:
        global_cve_ids: "{{ cve_advisory_ids }}"
        global_kb_ids: "{{ target_kb_ids }}"

    # --- RHEL AUDIT BLOCK ---
    - name: RHEL Audit Block
      when: ansible_os_family == "RedHat"
      become: yes
      block:
        - name: Check RHEL for Targeted Advisories
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false

        - name: Discover ALL Unpatched RHEL Advisories
          ansible.builtin.command: "dnf updateinfo list --security"
          register: rhel_all_check
          changed_when: false

        - name: Run RHEL 9 CIS Audit Role
          ansible.builtin.include_role:
            name: rhel9_cis
          vars:
            rhel9_cis_setup_audit: true
            rhel9_cis_run_audit: true
            rhel9_cis_remediate: false
            rhel9cis_authselect_custom_profile_name: "cis_hardened_profile"
          when: ansible_distribution_major_version == "9"

        - name: Fetch existing .audit_report directory (RHEL)
          ansible.builtin.fetch:
            src: "/root/.audit_report/"
            dest: "{{ local_audit_dir }}/{{ inventory_hostname }}/"
            flat: no
          failed_when: false

    # --- WINDOWS AUDIT BLOCK ---
    - name: Windows Audit Block
      when: ansible_os_family == "Windows"
      block:
        - name: Discover ALL Missing Windows KBs
          ansible.windows.win_updates:
            category_names: [SecurityUpdates, CriticalUpdates]
            state: searched
          register: win_all_check

        - name: Run Windows 2019 CIS Audit Role
          ansible.builtin.include_role:
            name: Windows-2019-CIS
          vars:
            setup_audit: true
            run_audit: true
            remediate: false
          when: "'2019' in ansible_distribution"

        - name: Fetch existing .audit_report directory (Windows)
          ansible.builtin.fetch:
            src: "C:/Users/Administrator/.audit_report/"
            dest: "{{ local_audit_dir }}/{{ inventory_hostname }}/"
            flat: no
          failed_when: false

    # --- COMPLIANCE DATA CONSOLIDATION ---
    - name: Set Universal Compliance Facts
      ansible.builtin.set_fact:
        compliance_status: >-
          {{ 'VULNERABLE' if (
            (rhel_target_check.stdout | default('') != '') or 
            (win_all_check.updates | default([]) | length > 0)
          ) else 'COMPLIANT' }}

# ==========================================
# PHASE 2: WEBSERVER DEPLOYMENT (FIXED)
# ==========================================
- name: Phase 2 - Deploy Centralized Report Webserver
  hosts: jp_webserver
  become: yes
  vars:
    local_audit_dir: "/runner/project/audit_reports"
    web_root_compliance: "/var/www/compliance"

  tasks:
    - name: Webserver Setup & Conflict Resolution
      block:
        - name: Disable SELinux completely
          ansible.builtin.selinux: { state: disabled }

        - name: Apply Permissive Mode at Runtime
          ansible.builtin.command: setenforce 0
          failed_when: false

        - name: Install Apache
          ansible.builtin.dnf: { name: httpd, state: present }

        - name: Prevent Port Conflict - Comment out Listen 80
          ansible.builtin.replace:
            path: /etc/httpd/conf/httpd.conf
            regexp: '^Listen 80'
            replace: '# Listen 80'

        - name: Configure Ports 8080 and 8081
          ansible.builtin.copy:
            dest: /etc/httpd/conf.d/ports.conf
            content: |
              Listen 8080
              Listen 8081

        - name: Open Firewall Ports
          ansible.posix.firewalld:
            port: "{{ item }}/tcp"
            permanent: yes
            state: enabled
            immediate: yes
          loop: [8080, 8081]

        - name: Start Apache
          ansible.builtin.service: { name: httpd, state: started, enabled: yes }

    - name: Prepare Compliance Web Directory
      ansible.builtin.file:
        path: "{{ web_root_compliance }}"
        state: directory
        mode: '0755'

    - name: Upload Collected .audit_report Data
      ansible.builtin.copy:
        src: "{{ local_audit_dir }}/"
        dest: "{{ web_root_compliance }}/"
        mode: '0644'

    - name: Generate Dashboard (8080)
      ansible.builtin.copy:
        dest: "/var/www/html/index.html"
        content: |
          <html><body style="font-family:sans-serif; padding:20px;">
          <h1>Infrastructure Security Dashboard (8080)</h1>
          <table border="1" cellpadding="10" style="border-collapse:collapse; width:100%;">
            <tr style="background:#eee;"><th>Host</th><th>Status</th><th>Audit Link</th></tr>
            {% for host in groups['all'] %}
            <tr>
              <td>{{ host }}</td>
              <td>{{ hostvars[host]['compliance_status'] | default('UNKNOWN') }}</td>
              <td><a href="http://{{ ansible_host }}:8081/{{ host }}/">Browse Reports</a></td>
            </tr>
            {% endfor %}
          </table></body></html>

    - name: Generate CIS Index (8081)
      ansible.builtin.copy:
        dest: "{{ web_root_compliance }}/index.html"
        content: |
          <html><body style="font-family:sans-serif; background:#2c3e50; color:white; padding:50px;">
          <div style="background:white; color:#333; padding:30px; border-radius:10px; max-width:800px; margin:auto;">
          <h1>CIS Security Portal (8081)</h1>
          <p>Historical and active .audit_report data:</p>
          <hr>
          {% for host in groups['all'] %}
          <a href="/{{ host }}/" style="display:block; padding:10px; margin:5px; background:#eee; text-decoration:none;">{{ host }} - Collected Audit Files</a>
          {% endfor %}
          </div></body></html>
      notify: Restart Apache

  handlers:
    - name: Restart Apache
      ansible.builtin.service: { name: httpd, state: restarted }