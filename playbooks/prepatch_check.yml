---
- name: Pre-Check Patch Applicability
  hosts: jp_rhel, jp_windows
  gather_facts: yes

  vars:
    # Accept lists from extra_vars, or default to these lists
    cve_advisory_ids: "{{ input_cve_ids | default(['RHSA-2026:8259', 'CVE-2026-33412']) }}"
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"

  tasks:
    # --- RHEL PRE-CHECK ---
    - name: Check if RHEL Advisories are needed
      when: ansible_os_family == "RedHat"
      block:
        - name: Query DNF for list of advisories
          # Joining the list into a space-separated string for the command
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_check
          changed_when: false

        - name: Identify which RHEL advisories are missing
          ansible.builtin.set_fact:
            missing_patches: "{{ cve_advisory_ids | select('in', rhel_check.stdout) | list }}"

        - name: Set RHEL status fact
          ansible.builtin.set_fact:
            patch_needed: "{{ missing_patches | length > 0 }}"

    # --- WINDOWS PRE-CHECK ---
    - name: Check if Windows KBs are installed
      when: ansible_os_family == "Windows"
      block:
        - name: Query HotFix list for KBs
          # We loop here because Get-HotFix throws an error if even one ID in a list is missing
          ansible.windows.win_shell: |
            if (Get-HotFix -Id {{ item }} -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }
          loop: "{{ target_kb_ids }}"
          register: win_checks
          failed_when: false
          changed_when: false

        - name: Identify which Windows KBs are missing
          ansible.builtin.set_fact:
            missing_patches: >-
              [{% for result in win_checks.results if result.rc != 0 %}
                "{{ result.item }}"{{ "," if not loop.last else "" }}
              {% endfor %}]

        - name: Set Windows status fact
          ansible.builtin.set_fact:
            patch_needed: "{{ missing_patches | length > 0 }}"

    # --- FINAL REPORT ---
    - name: Summary of Pre-Check
    # Using 'missing_patches' to show exactly what needs to be installed
      ansible.builtin.debug:
        msg: >
          System: {{ inventory_hostname }} | 
          Missing Items: {{ missing_patches | join(', ') if missing_patches else 'None' }} | 
          Execution Recommended: {{ 'YES' if patch_needed else 'NO (System Compliant)' }}