---
- name: Rollback Targeted Windows Security Patch
  hosts: jp_windows
  vars:
    # Ensure this matches the KB you want to remove
    target_kb_id: "{{ input_kb_id | default('4052623') }}"

  tasks:
    - name: Clean KB ID
      ansible.builtin.set_fact:
        # Strip "KB" if the user included it, as wusa just needs the number
        clean_kb_id: "{{ target_kb_id | regex_replace('(?i)KB', '') }}"

    - name: Check if the KB is installed
      ansible.windows.win_shell: "Get-HotFix -Id KB{{ clean_kb_id }}"
      register: hotfix_check
      failed_when: false
      changed_when: false

    - name: Uninstall Windows Update (KB{{ clean_kb_id }})
      ansible.windows.win_shell: "wusa.exe /uninstall /kb:{{ clean_kb_id }} /quiet /norestart"
      register: uninstall_result
      when: hotfix_check.rc == 0
      # rc 0 = success, rc 3010 = success but reboot required
      failed_when: uninstall_result.rc not in [0, 3010]
      changed_when: uninstall_result.rc in [0, 3010]

    - name: Update cacheable reboot flag
      ansible.builtin.set_fact:
        windows_reboot_needed: "{{ true if (undo_result.rc | default(0) == 3010) else false }}"
        cacheable: yes

    - name: Final Status
      ansible.builtin.debug:
        msg: 
          - "Rollback attempt for KB{{ clean_kb_id }} finished."
          - "Reboot Required: {{ windows_reboot_needed }}"
          - "Note: If the update was 'Permanent', wusa will return an error."