---
- name: Rollback Targeted Windows Security Patches
  hosts: jp_windows
  vars:
    # Changed to a list format
    target_kb_ids: "{{ input_kb_ids | default(['KB4052623', 'KB2267602']) }}"

  tasks:
    - name: Process Rollback Loop
      block:
        - name: Clean KB IDs and Check Status
          # We clean the KB prefix and check existence in one go for the loop
          ansible.windows.win_shell: |
            $id = "{{ item }}".ToUpper().Replace("KB", "")
            if (Get-HotFix -Id "KB$id" -ErrorAction SilentlyContinue) {
                return $id
            } else {
                exit 1
            }
          loop: "{{ target_kb_ids }}"
          register: hotfix_checks
          failed_when: false
          changed_when: false

        - name: Uninstall Windows Updates
          ansible.windows.win_shell: "wusa.exe /uninstall /kb:{{ item.stdout | trim }} /quiet /norestart"
          loop: "{{ hotfix_checks.results }}"
          register: uninstall_results
          # Only run if the previous check found the KB (rc == 0)
          when: item.rc == 0
          # rc 0 = success, rc 3010 = success but reboot required
          failed_when: 
            - uninstall_results.rc not in [0, 3010]
            - "'is not installed' not in uninstall_results.stderr"
          changed_when: uninstall_results.rc in [0, 3010]

    - name: Update cacheable reboot flag
      ansible.builtin.set_fact:
        # If any of the uninstall tasks returned 3010, a reboot is needed
        windows_reboot_needed: >-
          {{ uninstall_results.results 
             | selectattr('rc', 'defined') 
             | selectattr('rc', 'equalto', 3010) 
             | list | length > 0 }}
        cacheable: yes

    - name: Final Status
      ansible.builtin.debug:
        msg: 
          - "Rollback attempted for: {{ target_kb_ids | join(', ') }}"
          - "Reboot Required: {{ windows_reboot_needed }}"
          - "Summary: Check 'uninstall_results' for per-KB detail."