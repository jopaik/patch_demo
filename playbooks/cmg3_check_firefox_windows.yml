---
- name: Hardening Check - Block Unauthorized Software (Windows)
  hosts: jp_windows
  gather_facts: no
  tasks:
    - name: Check Registry for Firefox
      ansible.windows.win_reg_stat:
        path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Mozilla Firefox'
      register: firefox_reg

    - name: Fail if Firefox is present
      ansible.builtin.fail:
        msg: "SECURITY VIOLATION: Firefox is installed on {{ inventory_hostname }}. Browsers are prohibited on this tier."
      when: firefox_reg.exists

    - name: Compliance Pass
      ansible.builtin.debug:
        msg: "No unauthorized browsers detected."